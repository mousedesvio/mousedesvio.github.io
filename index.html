<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://unpkg.com/mathjs/lib/browser/math.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
        <link rel="stylesheet" href="style.css">

        <title>Calculadora de Propagação de Incertezas</title>
    </head>
    <body class="container">
        
        <div class="mainDiv">
            <h1>Calculadora de Propagação de Incertezas</h1>
            <div class="form-container">
                <form class="form" name="formulario">
                  <div class="form-group">
                    <label for="func">Insira sua função:</label>
                    <input type="text" id="equation" name="func" required="" placeholder="Equação formatada como em python, ex: 'y**(1/2)'">
                    <br>
                    <label for="vars">Insira as variáveis:</label>
                    <input type="text" id="vars" name="vars" required="" placeholder="Variáveis separadas por vírgula, ex: 'x, y, ...'">
                  </div>
                  <button class="form-submit-btn" type="submit" value="Calcular">Calcular</button>
                </form>
            </div>
            
            <div class="resultados" id="result">
                <div class="card">
                  <p>Resultado para planilhas</p>
                  <p id="text"></p>
                </div>
                <div class="card">
                  <p>Resultado em latex</p>
                  <div id="image"></div>
                </div>
            </div>

            <script src="lab.js"></script>
        </div>
    </body>
</html>
